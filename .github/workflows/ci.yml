name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Run generator specs
        run: bundle exec rake spec:generators

      - name: Prepare dummy app
        run: bin/prepare_dummy

      - name: Run request specs
        run: bundle exec rake spec:requests
